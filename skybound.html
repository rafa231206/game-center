<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <title>Skybound Lovers</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2196F3">
  <style>
    /* Global Styles */
    *, *::before, *::after {
      box-sizing: border-box; /* Ensures consistent box model */
    }

    /* ---------- Design tokens ---------- */
    :root {
      --sky-top: #6ec6ff;
      --sky-bottom: #eaf7ff;
      --accent-gold: #FFD54F;
      --accent-gold-deep: #FFB300;
      --accent-blue: #29B6F6;
      --accent-blue-deep: #0277BD;
      --accent-pink: #FF6FA8;
      --accent-pink-deep: #E91E63;
      --panel-bg: rgba(15, 23, 42, 0.72);
      --panel-border: rgba(255, 213, 79, 0.55);
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 10px;
    }

    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background:
        radial-gradient(ellipse 90% 60% at 50% 0%, rgba(255,255,255,0.35), transparent 60%),
        linear-gradient(180deg, var(--sky-top) 0%, #a8ddfb 40%, var(--sky-bottom) 100%);
      font-family: 'Press Start 2P', cursive;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      min-height: 100dvh;
      height: 100%;
      transition: background 0.5s ease-in-out; /* Smooth background transition */
      -webkit-tap-highlight-color: transparent; /* Remove tap highlight on mobile */
      position: relative;
    }

    /* Decorative ambient clouds drifting behind everything — purely CSS,
       just a couple of elements, so it adds atmosphere on spacious desktop
       / laptop screens without costing any game performance. */
    .ambient-cloud {
      position: fixed;
      pointer-events: none;
      background: rgba(255,255,255,0.55);
      border-radius: 50%;
      filter: blur(2px);
      z-index: 0;
      animation: driftCloud linear infinite;
    }
    .ambient-cloud::before, .ambient-cloud::after {
      content: '';
      position: absolute;
      background: inherit;
      border-radius: 50%;
    }
    .ambient-cloud.c1 { width: 140px; height: 50px; top: 8%; left: -160px; animation-duration: 38s; }
    .ambient-cloud.c1::before { width: 70px; height: 70px; top: -35px; left: 15px; }
    .ambient-cloud.c1::after  { width: 55px; height: 55px; top: -22px; right: 15px; }
    .ambient-cloud.c2 { width: 100px; height: 38px; top: 22%; left: -120px; animation-duration: 52s; animation-delay: -20s; opacity: 0.8; }
    .ambient-cloud.c2::before { width: 50px; height: 50px; top: -24px; left: 12px; }
    .ambient-cloud.c2::after  { width: 40px; height: 40px; top: -16px; right: 12px; }
    .ambient-cloud.c3 { width: 170px; height: 60px; top: 68%; left: -200px; animation-duration: 46s; animation-delay: -10s; opacity: 0.5; }
    .ambient-cloud.c3::before { width: 85px; height: 85px; top: -42px; left: 20px; }
    .ambient-cloud.c3::after  { width: 65px; height: 65px; top: -28px; right: 20px; }
    @keyframes driftCloud {
      from { transform: translateX(0); }
      to { transform: translateX(calc(100vw + 300px)); }
    }
    @media (max-width: 600px) {
      .ambient-cloud { display: none; } /* keep small screens focused on the game */
    }

    .no-transition {
      transition: none !important; /* Utility class to disable transitions */
    }

    canvas {
      display: block;
      margin: 0 auto;
      background-color: #b3e5fc; /* Default canvas background */
      border-radius: var(--radius-lg);
      box-shadow: 0 20px 45px rgba(10, 30, 60, 0.35), 0 0 0 6px rgba(255,255,255,0.4), 0 0 0 8px rgba(33,150,243,0.25);
      width: min(400px, 92vw);
      aspect-ratio: 2 / 3;
      height: auto;
      max-height: 88vh;
      transition: background-color 0.5s ease-in-out;
      touch-action: none; /* Prevent default touch actions */
      position: relative;
      z-index: 1;
    }

    /* Themes: base canvas tint only — all sky, clouds, buildings, birds and
       stars are now drawn directly on the canvas for a consistent art style
       and zero network dependency (no more mismatched cloud art, no lag from
       fetching remote images mid-game). */
    canvas.theme-buildings { box-shadow: 0 20px 45px rgba(10, 30, 60, 0.35), 0 0 0 6px rgba(255,255,255,0.4), inset 0 0 100px rgba(135, 206, 235, 0.6); }
    canvas.theme-birds     { box-shadow: 0 20px 45px rgba(10, 30, 60, 0.35), 0 0 0 6px rgba(255,255,255,0.4), inset 0 0 100px rgba(75, 0, 130, 0.6); }
    canvas.theme-space     { box-shadow: 0 20px 45px rgba(10, 30, 60, 0.35), 0 0 0 6px rgba(255,255,255,0.4), inset 0 0 100px rgba(0, 0, 0, 0.8); }

    /* Animations */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    @keyframes glow {
        0% { text-shadow: 0 0 5px #ff0; }
        50% { text-shadow: 0 0 15px #ff0, 0 0 10px #fa0; }
        100% { text-shadow: 0 0 5px #ff0; }
    }

    /* Screen Overlays (Start, Game Over, Pause) */
    #startScreen, #gameOverScreen, #pauseScreen {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.96);
      text-align: center;
      color: #fff;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.06), transparent 40%),
        var(--panel-bg);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      padding: clamp(16px, 4vw, 24px) clamp(16px, 4vw, 24px) clamp(46px, 8vw, 60px);
      border-radius: var(--radius-lg);
      box-shadow: 0 25px 50px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.15);
      border: 2px solid var(--panel-border);
      max-width: 92vw;
      max-height: 90vh;
      overflow-y: auto;
      width: 350px; /* Fixed width for better consistency */
      box-sizing: border-box;
      display: none;
      opacity: 0;
      transition: opacity 0.4s ease-in-out, transform 0.4s ease-in-out;
      z-index: 10;
    }
    #startScreen.show, #gameOverScreen.show, #pauseScreen.show {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
    }
    #gameOverScreen {
        border: 2px solid rgba(255, 111, 168, 0.6);
        padding-top: clamp(56px, 10vw, 70px);
    }
    #startScreen h1, #gameOverScreen h2, #pauseScreen h2 {
        font-size: clamp(1.1em, 4.5vw, 1.8em);
        color: var(--accent-gold);
        text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        margin-bottom: 20px;
        letter-spacing: 0.5px;
    }
    #gameOverScreen h2 {
        color: var(--accent-pink);
        position: relative;
        margin-top: 10px;
    }
    #loadingScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(160deg, #1a1a3d 0%, #2b1b52 50%, #1a1a3d 100%);
      color: #fff;
      font-family: 'Press Start 2P', cursive;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      z-index: 9999;
      transition: opacity 0.3s ease;
    }
    #loadingScreen.loading-done { opacity: 0; }
    #loadingLogo {
      width: clamp(80px, 22vw, 110px);
      height: auto;
      filter: drop-shadow(0 0 15px rgba(255,215,0,0.6));
      animation: pulse 1.5s infinite;
    }
    #loadingTitle {
      font-size: clamp(0.6em, 3vw, 0.9em);
      color: var(--accent-gold);
      text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
      letter-spacing: 1px;
      text-align: center;
      padding: 0 10px;
    }
    #loadingBarTrack {
      width: 240px;
      max-width: 70vw;
      height: 18px;
      background: rgba(255,255,255,0.15);
      border: 2px solid var(--accent-gold);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
    }
    #loadingBarFill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #2196F3, #00BCD4, #FFD700);
      background-size: 200% 100%;
      animation: shimmer 1.2s linear infinite;
      border-radius: 20px;
      transition: width 0.25s ease-out;
    }
    @keyframes shimmer {
      0% { background-position: 0% 0; }
      100% { background-position: 200% 0; }
    }
    #loadingPercent {
      font-size: 0.7em;
      color: #fff;
      opacity: 0.85;
    }
    /* Character Selection */
    .character-options {
      display: flex;
      flex-direction: row; /* Tetap row untuk tampilan desktop */
      gap: 20px;
      margin-top: 20px;
      justify-content: center; /* Pusatkan secara horizontal */
      flex-wrap: wrap;
      align-items: flex-start; /* Pusatkan secara vertikal di awal baris */
    }
    
    .character-card {
      padding: clamp(10px, 3vw, 15px);
      border-radius: var(--radius-md);
      background: rgba(255,255,255,0.10);
      transition: all 0.3s ease;
      cursor: pointer;
      border: 2px solid rgba(255,255,255,0.15);
      min-width: 110px;
      max-width: 180px;
      box-sizing: border-box;
      margin: 5px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .character-card:hover {
      transform: translateY(-5px) scale(1.04);
      background: rgba(255,255,255,0.22);
      border-color: var(--accent-gold);
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }
    .character-card.selected {
      border-color: var(--accent-gold);
      box-shadow: 0 0 18px rgba(255,213,79,0.7), inset 0 0 12px rgba(255,213,79,0.15);
      background: rgba(255,213,79,0.1);
      transform: scale(1.04);
    }
    .character-image {
      width: clamp(70px, 20vw, 100px);
      height: clamp(70px, 20vw, 100px);
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #fff;
      margin-bottom: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    /* Buttons */
    .character-button, .game-over-button, .main-button, .back-button, .pause-button {
      padding: clamp(11px, 3vw, 15px) clamp(16px, 4vw, 24px);
      border: none;
      border-radius: 50px;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-blue-deep));
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
      font-family: 'Press Start 2P', cursive;
      font-size: clamp(0.65em, 2.6vw, 0.8em);
      text-transform: uppercase;
      letter-spacing: 1px;
      width: 100%;
      box-sizing: border-box;
      box-shadow: 0 4px 0 rgba(2, 60, 100, 0.5), 0 8px 16px rgba(0,0,0,0.25);
    }
    .character-button:hover, .main-button:hover, .back-button:hover, .pause-button:hover {
      transform: translateY(-2px);
      filter: brightness(1.08);
      box-shadow: 0 6px 0 rgba(2, 60, 100, 0.5), 0 10px 20px rgba(0,0,0,0.3);
    }
    .character-button:active, .main-button:active, .back-button:active, .pause-button:active,
    .game-over-button:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 rgba(2, 60, 100, 0.5), 0 4px 8px rgba(0,0,0,0.25);
      filter: brightness(0.97);
    }

    .main-button {
      background: linear-gradient(135deg, var(--accent-gold), var(--accent-gold-deep));
      border: 2px solid rgba(255,255,255,0.6);
      box-shadow: 0 4px 0 rgba(180, 120, 0, 0.55), 0 8px 18px rgba(0,0,0,0.3);
      color: #4a2f00;
      margin: 20px auto;
      animation: pulse 1.8s infinite;
    }
    .main-button:hover {
      box-shadow: 0 6px 0 rgba(180, 120, 0, 0.55), 0 10px 22px rgba(0,0,0,0.35);
    }

    .back-button {
      background: rgba(255,255,255,0.12);
      border: 2px solid rgba(255,255,255,0.35);
      box-shadow: 0 4px 0 rgba(0,0,0,0.25), 0 6px 12px rgba(0,0,0,0.2);
      margin-top: 20px;
    }
    .back-button:hover { background: rgba(255,255,255,0.2); }

    /* Score Displays */
    #finalScore {
        font-size: clamp(0.9em, 3.5vw, 1.2em);
        margin-bottom: 20px;
        color: var(--accent-gold);
    }
    #highScoreDisplay {
        font-size: clamp(0.85em, 3.2vw, 1.3em);
        margin: 15px 0;
        padding: 15px;
        color: var(--accent-gold);
        background: rgba(0,0,0,0.35);
        border-radius: var(--radius-sm);
        border: 2px solid var(--accent-gold);
        box-shadow: 0 0 15px rgba(255,213,79,0.4);
        text-shadow: 0 0 5px #ff0;
        animation: pulse 1.5s infinite;
    }

    .new-highscore {
        animation: glow 1s infinite, pulse 0.5s infinite !important;
        color: #ffcc00 !important;
        background: rgba(255,0,0,0.2) !important;
    }

    .game-over-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(14px, 4vw, 22px);
      margin-bottom: 15px;
    }
    .game-over-icon {
      width: clamp(1.8em, 8vw, 2.4em);
      height: clamp(1.8em, 8vw, 2.4em);
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid white;
      box-shadow: 0 0 6px rgba(255, 255, 255, 0.4);
      animation: float 3s ease-in-out infinite;
    }

    .button-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }
    .game-over-button {
      background: linear-gradient(135deg, var(--accent-pink), var(--accent-pink-deep));
      box-shadow: 0 4px 0 rgba(140, 20, 70, 0.55), 0 8px 16px rgba(0,0,0,0.3);
      font-size: clamp(0.7em, 3vw, 1em);
      margin-top: 0;
    }
    .game-over-button:hover {
      transform: translateY(-3px);
      filter: brightness(1.08);
      box-shadow: 0 6px 0 rgba(140, 20, 70, 0.55), 0 10px 20px rgba(0,0,0,0.35);
    }

    /* Popups */
    #coinMilestonePopup {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: clamp(120px, 40vw, 200px);
      height: auto;
      opacity: 0;
      transition: opacity 0.5s ease-in-out;
      z-index: 100;
      border-radius: var(--radius-md);
      box-shadow: 0 0 30px rgba(255,213,79,0.9);
      border: 3px solid var(--accent-gold);
      max-width: 80%;
    }

    #scoreDisplay {
        position: absolute;
        top: clamp(8px, 2vw, 12px);
        right: clamp(8px, 2vw, 12px);
        background: linear-gradient(135deg, rgba(20,20,35,0.75), rgba(20,20,35,0.55));
        backdrop-filter: blur(6px);
        color: #fff;
        padding: clamp(6px, 1.8vw, 9px) clamp(9px, 2.2vw, 13px);
        border-radius: var(--radius-sm);
        font-family: 'Press Start 2P', cursive;
        font-size: clamp(0.55em, 2.2vw, 0.8em);
        display: flex;
        align-items: center;
        gap: 8px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        border: 2px solid var(--accent-gold);
        z-index: 50;
        white-space: nowrap;
    }
    #scoreDisplay img {
        width: clamp(14px, 4vw, 20px);
        height: clamp(14px, 4vw, 20px);
        vertical-align: middle;
    }
    #scoreDisplay span {
        margin-left: 3px;
        color: var(--accent-gold);
    }

    #livesDisplay {
      position: absolute;
      top: clamp(8px, 2vw, 12px);
      left: clamp(8px, 2vw, 12px);
      background: linear-gradient(135deg, rgba(20,20,35,0.75), rgba(20,20,35,0.55));
      backdrop-filter: blur(6px);
      padding: clamp(6px, 1.8vw, 9px) clamp(9px, 2.2vw, 13px);
      border-radius: var(--radius-sm);
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      border: 2px solid var(--accent-gold);
      z-index: 50;
      display: flex;
      gap: 5px;
      align-items: center;
    }
    .life-icon {
      width: clamp(16px, 5vw, 25px);
      height: clamp(16px, 5vw, 25px);
      filter: drop-shadow(0 0 5px rgba(255,0,0,0.7));
      transition: opacity 0.3s ease;
    }

    #pauseButton {
      position: absolute;
      bottom: clamp(70px, 2vw, 12px);
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, rgba(20,20,35,0.75), rgba(20,20,35,0.55));
      backdrop-filter: blur(6px);
      color: #fff;
      padding: clamp(6px, 1.8vw, 9px) clamp(12px, 3vw, 17px);
      border-radius: var(--radius-sm);
      font-family: 'Press Start 2P', cursive;
      font-size: clamp(0.6em, 2.2vw, 0.8em);
      border: 2px solid var(--accent-gold);
      cursor: pointer;
      z-index: 50;
      display: none; /* Hidden by default, shown when game starts */
      transition: background 0.2s ease, transform 0.15s ease;
    }
    #pauseButton:hover {
      background: rgba(0, 0, 0, 0.85);
      transform: translateX(-50%) translateY(-1px);
    }
    #pauseButton:active { transform: translateX(-50%) translateY(1px); }

    /* Leaderboard Styles */
    .leaderboard-button {
      padding: 10px 15px;
      border: none;
      border-radius: 50px;
      background: rgba(255,255,255,0.1);
      color: white;
      font-family: 'Press Start 2P', cursive;
      font-size: 0.7em;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 20px;
      border: 2px solid var(--accent-gold);
    }
    .leaderboard-button:hover {
      background: rgba(0,0,0,0.8);
      transform: translateY(-2px);
    }
    #leaderboard {
      margin-top: 10px;
      background: rgba(0,0,0,0.35);
      padding: 15px;
      border-radius: var(--radius-md);
      border: 2px solid var(--accent-gold);
      max-height: 200px;
      overflow-y: auto;
      color: #fff;
      font-size: clamp(0.6em, 2.5vw, 0.8em);
      text-align: left;
      transition: all 0.3s ease;
    }
    .leaderboard-hidden {
      max-height: 0;
      padding: 0 15px;
      margin: 0;
      border: 0;
      overflow: hidden;
      opacity: 0;
    }
    #leaderboard h3 {
      color: var(--accent-gold);
      margin-top: 0;
      margin-bottom: 10px;
      text-align: center;
    }
    #leaderboard ol {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    #leaderboard li {
      padding: 6px 4px;
      border-bottom: 1px dashed rgba(255,255,255,0.2);
      display: flex;
      justify-content: space-between;
      border-radius: 6px;
    }
    #leaderboard li:nth-child(odd) {
      background: rgba(255,255,255,0.04);
    }
    #leaderboard li:last-child {
      border-bottom: none;
    }
    #leaderboard li span:first-child {
      color: #90CAF9;
    }
    #leaderboard li span:last-child {
      color: var(--accent-gold);
      font-weight: bold;
    }

    /* Creator text styling */
    #creatorText {
      position: fixed;
      bottom: env(safe-area-inset-bottom, 20px);
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 500px;
      text-align: center;
      font-size: clamp(0.5em, 2vw, 0.7em);
      padding: 10px;
      background: rgba(10,10,20,0.75);
      backdrop-filter: blur(6px);
      color: var(--accent-gold);
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
      border: 2px solid rgba(255,213,79,0.3);
      border-radius: var(--radius-md);
      z-index: 100;
      opacity: 0.85;
      line-height: 1.6;
    }

    /* Game Logo */
    #gameLogo {
      width: clamp(100px, 30vw, 150px);
      height: auto;
      margin-bottom: 15px;
      filter: drop-shadow(0 0 10px rgba(255,215,0,0.8));
    }

    /* Power-up styles */
    .power-up {
      position: absolute;
      width: 30px;
      height: 30px;
      background-color: gold; /* Example color */
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.2em;
      font-weight: bold;
      color: white;
      text-shadow: 0 0 5px black;
      box-shadow: 0 0 10px gold;
      z-index: 3;
      animation: pulse 1s infinite;
    }
    .power-up.jump-boost {
      background: linear-gradient(45deg, #FFD700, #FFA500);
      box-shadow: 0 0 15px #FFD700;
      font-size: 1.5em;
      line-height: 1;
    }

    /* Audio control buttons */
    .audio-controls {
      position: fixed;
      bottom: env(safe-area-inset-bottom, 20px);
      right: 20px;
      display: flex;
      gap: 10px;
      z-index: 101;
    }

    .audio-control-button {
      background: rgba(10,10,20,0.7);
      backdrop-filter: blur(6px);
      color: white;
      border: 2px solid var(--accent-gold);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.2em;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.15s ease;
    }
    .audio-control-button:hover {
      background: rgba(0, 0, 0, 0.85);
      transform: translateY(-2px);
    }
    .audio-control-button:active { transform: translateY(1px); }

    /* Theme popup */
    .theme-popup {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 15px 30px;

    /* Short/landscape viewports (e.g. phone rotated) — shrink the panel and

    }
  </style>
</head>

  </div>

  <script defer>
    // DOM Elements
    const loadingScreen = document.getElementById("loadingScreen");
    const jumpSound = document.getElementById("jumpSound");
    const coinSound = document.getElementById("coinSound");
    const gameOverSound = document.getElementById("gameOverSound");
    const powerupSound = document.getElementById("powerupSound");
    const damageSound = document.getElementById("damageSound");
    const buttonSound = document.getElementById("buttonSound");
    const bgm = document.getElementById("bgm");
    const menuBgm = document.getElementById("menuBgm");
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const startScreen = document.getElementById("startScreen");
    const gameOverScreen = document.getElementById("gameOverScreen");
    const pauseScreen = document.getElementById("pauseScreen");
    const coinMilestonePopup = document.getElementById("coinMilestonePopup");
    const currentScoreDisplay = document.getElementById("currentScore");
    const currentCoinScoreDisplay = document.getElementById("currentCoinScore");
    const highScoreDisplay = document.getElementById('highScoreDisplay');
    const canvasElement = document.getElementById('gameCanvas');
    const livesDisplay = document.getElementById('livesDisplay');
    const pauseButton = document.getElementById('pauseButton');
    const leaderboardList = document.getElementById('leaderboardList');
    const characterCards = document.querySelectorAll('.character-card');
    const selectedCharacterImg = document.getElementById('selectedCharacterImg');
    const startGameButton = document.getElementById('startGameButton');
    const bgmControl = document.getElementById('bgmControl');
    const sfxControl = document.getElementById('sfxControl');

    // Game State Variables
    let selectedCharacter = null; // Store the ID of the selected character
    const player = {
      x: 180,
      y: 500,
      width: 50,
      height: 50,
      dy: 0,
      jumpPower: -12,
      gravity: 0.5,
      speed: 0,
      maxSpeed: 5,
      image: new Image(),
      jumps: 0, // For double jump
      maxJumps: 2, // For double jump
      isFalling: false // To track if player is falling
    };
 
    const platforms = [];
    const platformCount = 8;
    let score = 0;
    let lastSafePosition = { x: player.x, y: player.y };
    let coinScore = 0;
    let gameStarted = false;
    let isPaused = false;
    let lastMilestone = 0;
    let highScore = localStorage.getItem('highScore') ? parseInt(localStorage.getItem('highScore')) : 0;
    let lives = 3;
    let animationFrameId; // To store requestAnimationFrame ID
    let isBgmMuted = localStorage.getItem('isBgmMuted') === 'true'; // Load BGM mute state
    let isSfxMuted = localStorage.getItem('isSfxMuted') === 'true'; // Load SFX mute state

    const coins = [];
    const coinImage = new Image();
    coinImage.src = "coin.png";

    const powerUps = [];
    const powerUpImage = new Image();
    powerUpImage.src = "powerup.png"; // Placeholder for a jump power-up image

    let platformSpeedMultiplier = 1; // For level progression
    let jumpBoostActive = false;
    let originalJumpPower = player.jumpPower;

    // Asset Paths — every asset the game can possibly use is listed here and
    // fully preloaded (and decoded) before the player ever sees the menu.
    // Backgrounds/clouds/birds/stars are drawn straight on canvas, so no
    // remote images are needed for them (this used to be the biggest source
    // of hitching, since the browser had to fetch them mid-run).
    const imageAssets = [
      'popup.jpg',
      'laki-laki copy.png',
      'ChatGPT Image 15 Jul 2025 15.43.23.png',
      'perempuan copyy.png',
      'ChatGPT_Image_15_Jul_2025_15.20.27-removebg-preview.png',
      'coin.png',
      'heart.png',
      'zada.jpg',
      'farel.jpg',
      'powerup.png'
    ];

    const audioAssets = [
      'jump.mp3',
      'coin.mp3',
      'gameover.mp3',
      'powerup.mp3',
      'damage.mp3',
      'click.mp3',
      'bgm.mp3',
      'menu.mp3'
    ];

    const loadingBarFill = document.getElementById('loadingBarFill');
    const loadingPercent = document.getElementById('loadingPercent');

    /**
     * Preloads every image and audio asset up front so nothing needs to be
     * fetched from the network while the game is actually running (this is
     * what removes loading-related lag/stutter mid-game). Each asset has a
     * safety timeout so one slow/broken file can't freeze the loading screen.
     */
    async function preloadAssets() {
      const total = imageAssets.length + audioAssets.length;
      let loaded = 0;
      const bump = () => {
        loaded++;
        const pct = Math.round((loaded / total) * 100);
        if (loadingBarFill) loadingBarFill.style.width = pct + '%';
        if (loadingPercent) loadingPercent.textContent = pct + '%';
      };
      const withTimeout = (promise, ms = 8000) => {
        return Promise.race([
          promise,
          new Promise(resolve => setTimeout(resolve, ms))
        ]);
      };

      const imagePromises = imageAssets.map(src => withTimeout(new Promise(resolve => {
        const img = new Image();
        img.decoding = 'async';
        img.src = src;
        img.onload = async () => {
          try { if (img.decode) await img.decode(); } catch (e) {}
          resolve();
        };
        img.onerror = () => {
          console.warn(`Failed to load image: ${src}`);
          resolve(); // Resolve even on error to not block loading
        };
      })).then(bump));

      const audioPromises = audioAssets.map(src => withTimeout(new Promise(resolve => {
        const audio = new Audio();
        audio.preload = 'auto';
        audio.src = src;
        audio.oncanplaythrough = () => resolve();
        audio.onerror = () => {
          console.warn(`Failed to load audio: ${src}`);
          resolve(); // Resolve even on error
        };
        audio.load(); // Start loading the audio
      })).then(bump));

      await Promise.all([...imagePromises, ...audioPromises]);
      if (loadingBarFill) loadingBarFill.style.width = '100%';
      if (loadingPercent) loadingPercent.textContent = '100%';
      loadingScreen.classList.add('loading-done');
      setTimeout(() => { loadingScreen.style.display = "none"; }, 300);
    }

    /**
     * Plays an audio element, handling potential Promise rejections.
     * @param {HTMLAudioElement} audioElement - The audio element to play.
     * @param {string} type - 'sfx' or 'bgm'
     */
    function playSound(audioElement, type) {
      if (type === 'sfx' && isSfxMuted) return;
      if (type === 'bgm' && isBgmMuted) return;

      if (audioElement) {
        audioElement.currentTime = 0; // Reset to start
        audioElement.play().catch(error => {
          console.warn("Autoplay prevented:", error);
        });
      }
    }

    /**
     * Toggles the mute state of BGM.
     */
    function toggleBgmMute() {
      isBgmMuted = !isBgmMuted;
      localStorage.setItem('isBgmMuted', isBgmMuted);
      if (isBgmMuted) {
        menuBgm.pause();
        bgm.pause();
        bgmControl.textContent = '🔇';
      } else {
        if (gameStarted) {
          playSound(bgm, 'bgm');
        } else {
          playSound(menuBgm, 'bgm');
        }
        bgmControl.textContent = '🎵';
      }
    }

    /**
     * Toggles the mute state of SFX.
     */
    function toggleSfxMute() {
      isSfxMuted = !isSfxMuted;
      localStorage.setItem('isSfxMuted', isSfxMuted);
      const sfxElements = [jumpSound, coinSound, gameOverSound, powerupSound, damageSound, buttonSound];
      sfxElements.forEach(audio => {
        audio.muted = isSfxMuted;
      });
      sfxControl.textContent = isSfxMuted ? '🔕' : '🔊';
    }

    // Event listener for all buttons to play click sound
    document.querySelectorAll("button").forEach(btn => {
      btn.addEventListener("click", () => {
        playSound(buttonSound, 'sfx');
      });
    });

    // Function to draw the player (using canvas for player)
    function drawPlayer() {
      if (player.image.src && player.image.complete) {
        ctx.drawImage(player.image, player.x, player.y, player.width, player.height);
      } else {
        // Fallback if image fails to load
        ctx.fillStyle = 'blue';
        ctx.fillRect(player.x, player.y, player.width, player.height);
      }
    }

    // Function to draw coins (using canvas for coins)
    function drawCoins() {
      coins.forEach(coin => {
        if (!coin.taken) {
          ctx.drawImage(coinImage, coin.x, coin.y, coin.width, coin.height);
        }
      });
    }

    // Function to draw power-ups (using canvas for power-ups)
    function drawPowerUps() {
      powerUps.forEach(pu => {
        if (!pu.taken) {
          ctx.drawImage(powerUpImage, pu.x, pu.y, pu.width, pu.height);
        }
      });
    }

    // Function to create coins (called when a new platform appears).
    // Coins are stored as an offset from their platform, not an absolute
    // position, so they stay perfectly glued to the cloud even while it
    // drifts horizontally/vertically.
    function createCoinOnPlatform(platform) {
      if (platform.type !== "obstacle" && Math.random() < 0.5 ) { // 90% chance
        const coinCount = 1; // Max 3 coins based on platform width
        const spacing = platform.width / (coinCount + 1);
        for (let i = 1; i <= coinCount; i++) {
          coins.push({
            platform,
            offsetX: (spacing * i) - 15,
            offsetY: -26,
            x: platform.x + (spacing * i) - 15,
            y: platform.y - 26,
            width: 30,
            height: 30,
            taken: false
          });
        }
      }
    }

    // Function to create power-up
    function createPowerUp(platform) {
      const offsetX = platform.width / 2 - 15;
      const offsetY = -38;
      powerUps.push({
        platform,
        offsetX,
        offsetY,
        x: platform.x + offsetX,
        y: platform.y + offsetY,
        width: 30,
        height: 30,
        type: 'jump-boost',
        taken: false
      });
    }

    // Tracks the x-position of the most recently generated platform so new
    // ones can be placed within a jumpable horizontal distance instead of
    // fully random (which used to sometimes place the next cloud too far to
    // reach, causing repeated unavoidable deaths).
    let lastPlatformX = canvas.width / 2 - 30;
const MIN_HORIZONTAL_REACH = 80;
const MAX_HORIZONTAL_REACH = 100;

function nextPlatformX(width) {
    let x;

    do {
        x = Math.random() * (canvas.width - width);
    } while (
        Math.abs(x - lastPlatformX) < MIN_HORIZONTAL_REACH ||
        Math.abs(x - lastPlatformX) > MAX_HORIZONTAL_REACH
    );

    lastPlatformX = x;
    return x;
}

    // Function to initialize platforms — pure data now, nothing touches the
    // DOM, so there's no layout/reflow cost at all during gameplay.
    function initializePlatforms() {
      platforms.length = 0;
      lastPlatformX = canvas.width / 2 - 30;

      // Initial stable platform
      platforms.push({
        x: 0, y: 570, width: 400, height: 14,
        type: "static", disappearing: false, touched: false,
        opacity: 1, wobble: Math.random() * Math.PI * 2
      });

      // Create other platforms, each reachable from the previous one, evenly
      // spaced 60px apart — matches canvas.height (600) closely enough that
      // 9-10 clouds are always alive at once, well above the minimum of 3.
      for (let i = 0; i < platformCount; i++) {
        const width = 80;
        platforms.push({
          x: nextPlatformX(width),
          y: 600 - (i + 1) * 75,
          width, height: 5,
          type: "static", disappearing: false, touched: false,
          opacity: 1, wobble: Math.random() * Math.PI * 2
        });
      }
    }

    // Function to move platforms (pure math, no DOM writes)
    function movePlatforms(dy) {
      platforms.forEach(p => {
        p.y += dy * platformSpeedMultiplier;

        if (p.y > canvas.height) { // If platform goes off screen
          // Wrap to the top, but preserve exactly how far past the bottom
          // edge it overshot this frame instead of discarding that distance.
          // (A plain "p.y = -p.height" reset throws away that leftover bit
          // of movement every single time, and — even though each individual
          // loss is tiny — it accumulates into a slow random drift over a
          // long play session, eventually spacing some clouds much farther
          // apart than others. Carrying the overshoot forward keeps the gap
          // mathematically exact forever, at any speed or difficulty level.)
          const overshoot = p.y - canvas.height;
          p.y = -p.height + overshoot;
          score++;

          // Any coins/power-ups still tied to this platform's previous life
          // are stale now — clear them before generating a fresh set so
          // nothing lingers or teleports oddly.
          for (let i = coins.length - 1; i >= 0; i--) {
            if (coins[i].platform === p) coins.splice(i, 1);
          }
          for (let i = powerUps.length - 1; i >= 0; i--) {
            if (powerUps[i].platform === p) powerUps.splice(i, 1);
          }

          // Re-determine platform type randomly
          const randomType = Math.random();
          p.disappearing = false;
          p.touched = false;
          p.opacity = 1;
          p.wobble = Math.random() * Math.PI * 2;
          p.moveRange = 0;
          p.moveAxis = null;

          if (randomType < 0.2) {
            p.type = "horizontal";
            p.width = 80; p.height = 14;
            p.x = nextPlatformX(p.width);
            p.baseX = p.x;
            p.moveAxis = 'x';
            p.moveRange = 22; // gentle drift, always stays reachable
          } else if (randomType < 0.4) {
            p.type = "vertical";
            p.width = 70; p.height = 14;
            p.x = nextPlatformX(p.width);
            p.baseY = p.y;
            p.moveAxis = 'y';
            p.moveRange = 12; // gentle drift, always stays reachable
          } else if (randomType < 0.46) {
            p.type = "obstacle";
            p.width = 40; p.height = 40;
            p.x = nextPlatformX(p.width);
            p.y -= 6; // barely raised, kept very easy to reach
          } else if (score >= 250 && randomType < 0.5) { // Disappearing platforms, eased in much later & rarer
            p.type = "static";
            p.width = 60; p.height = 14;
            p.x = nextPlatformX(p.width);
            p.disappearing = true;
          } else {
            p.type = "static";
            p.width = 60; p.height = 14;
            p.x = nextPlatformX(p.width);
          }

          createCoinOnPlatform(p); // Add coins to new platform

          // Add power-up every 20 coins
          if (coinScore > 0 && coinScore % 20 === 0) {
            createPowerUp(p);
          }
        }

        // Gentle animated drift for moving platform types (drawn, not DOM)
        p.wobble += 0.03;
        if (p.moveAxis === 'x') {
          p.x = p.baseX + Math.sin(p.wobble) * p.moveRange;
          p.x = Math.max(0, Math.min(canvas.width - p.width, p.x));
        } else if (p.moveAxis === 'y') {
    p.baseY += dy * platformSpeedMultiplier;
    p.y = p.baseY + Math.sin(p.wobble) * p.moveRange;
}

        // Fade out touched disappearing platforms
        if (p.disappearing && p.touched && p.opacity > 0) {
          p.opacity = Math.max(0, p.opacity - 0.06);
        }

        // Keep every coin/power-up glued neatly to its own platform —
        // recomputed from the platform's live position every frame so they
        // never drift away or float off during horizontal/vertical wobble.
        coins.forEach(c => {
          if (c.platform === p) {
            c.x = p.x + c.offsetX;
            c.y = p.y + c.offsetY;
          }
        });
        powerUps.forEach(pu => {
          if (pu.platform === p) {
            pu.x = p.x + pu.offsetX;
            pu.y = p.y + pu.offsetY;
          }
        });
      });

      // Remove coins/power-ups that end up off screen (e.g. the very last
      // ones tied to a platform that despawned without being recycled)
      for (let i = coins.length - 1; i >= 0; i--) {
        if (coins[i].y > canvas.height || coins[i].y < -50) coins.splice(i, 1);
      }
      for (let i = powerUps.length - 1; i >= 0; i--) {
        if (powerUps[i].y > canvas.height || powerUps[i].y < -50) powerUps.splice(i, 1);
      }
    }

    // Function to check player-platform collision using plain numbers —
    // no getBoundingClientRect calls, which used to force a layout
    // recalculation on every single frame for every platform (the main
    // cause of jank/lag during gameplay).
    function checkPlatformCollision() {
      let onPlatform = false;
      platforms.forEach(p => {
        if (p.opacity <= 0) return; // Already disappeared, no collision

        const pX = p.x, pY = p.y, pWidth = p.width, pHeight = p.height;

        if (
          player.dy > 0 && // Player is falling
          player.x + player.width > pX &&
          player.x < pX + pWidth &&
          player.y + player.height > pY &&
          player.y + player.height < pY + pHeight + player.dy // Player lands on top of platform
        ) {
          player.dy = player.jumpPower; // Make player jump
          player.y = pY - player.height; // Snap player to top of platform
          player.jumps = 0; // Reset double jump
          lastSafePosition = { x: player.x, y: player.y };
          onPlatform = true;

          // Particle effect on landing
          createParticles(player.x + player.width / 2, player.y + player.height, '#ffffff');

          // Handle disappearing platforms
          if (p.disappearing && !p.touched) {
            p.touched = true; // fade-out is handled in movePlatforms()
          }
        }
      });
      player.isFalling = !onPlatform && player.dy > 0; // Update isFalling status
    }

    // ---------- Canvas cloud / obstacle rendering ----------
    // Draws a soft, layered "cloud" shape instead of a plain rectangle div,
    // so platforms actually look like fluffy clouds and match each other
    // consistently across the whole game.
    function drawCloudPlatform(p) {
      if (p.opacity <= 0) return;
      ctx.save();
      ctx.globalAlpha = p.opacity;

      if (p.type === 'obstacle') {
        // Sparkling star-orb obstacle
        const cx = p.x + p.width / 2, cy = p.y + p.height / 2, r = p.width / 2;
        const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
        grad.addColorStop(0, 'rgba(255,255,255,0.95)');
        grad.addColorStop(0.7, 'rgba(255,235,180,0.7)');
        grad.addColorStop(1, 'rgba(255,215,0,0.15)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
        return;
      }

      const x = p.x, y = p.y, w = p.width, h = Math.max(p.height, 16);
      const cy = y + h * 0.55;

      // soft drop shadow under the cloud
      ctx.shadowColor = 'rgba(70,100,140,0.25)';
      ctx.shadowBlur = 8;
      ctx.shadowOffsetY = 4;

      const grad = ctx.createLinearGradient(x, y, x, y + h);
      grad.addColorStop(0, '#ffffff');
      grad.addColorStop(1, '#e4f1fb');
      ctx.fillStyle = grad;

      // Cluster of overlapping circles forms a cloud silhouette
      ctx.beginPath();
      const lumps = Math.max(3, Math.round(w / 28));
      const lumpR = h * 0.62;
      ctx.moveTo(x, cy + lumpR * 0.3);
      for (let i = 0; i < lumps; i++) {
        const lx = x + (w / lumps) * (i + 0.5);
        const lr = lumpR * (0.75 + 0.25 * Math.sin(i * 1.7 + p.wobble));
        ctx.arc(lx, cy - lumpR * 0.25, lr, Math.PI, 0);
      }
      ctx.lineTo(x + w, cy + lumpR * 0.3);
      ctx.quadraticCurveTo(x + w / 2, cy + lumpR * 1.1, x, cy + lumpR * 0.3);
      ctx.closePath();
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.shadowOffsetY = 0;

      // subtle highlight
      ctx.globalAlpha = p.opacity * 0.6;
      ctx.fillStyle = 'rgba(255,255,255,0.8)';
      ctx.beginPath();
      ctx.ellipse(x + w * 0.3, cy - lumpR * 0.35, w * 0.18, lumpR * 0.3, 0, 0, Math.PI * 2);
      ctx.fill();

      // tiny motion trail hint for moving clouds
      if (p.moveAxis) {
        ctx.globalAlpha = p.opacity * 0.18;
        ctx.fillStyle = '#ffffff';
        const dir = p.moveAxis === 'x' ? 1 : 0;
        ctx.beginPath();
        ctx.ellipse(x + w / 2 - dir * 14, cy + (1 - dir) * 10, w * 0.4, h * 0.4, 0, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawPlatforms() {
      platforms.forEach(drawCloudPlatform);
    }

    // ---------- Canvas particle effects (replaces DOM particles) ----------
    const particles = [];
    function createParticles(x, y, color = '#ffffff') {
      const numParticles = 5 + Math.floor(Math.random() * 5);
      for (let i = 0; i < numParticles; i++) {
        particles.push({
          x: x + (Math.random() * 10 - 5),
          y: y + (Math.random() * 10 - 5),
          size: Math.random() * 4 + 2,
          vx: (Math.random() - 0.5) * 2,
          vy: -Math.random() * 2 - 0.5,
          life: 1,
          color
        });
      }
    }

    function updateAndDrawParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const pt = particles[i];
        pt.x += pt.vx;
        pt.y += pt.vy;
        pt.vy += 0.05;
        pt.life -= 0.045;
        if (pt.life <= 0) {
          particles.splice(i, 1);
          continue;
        }
        ctx.save();
        ctx.globalAlpha = Math.max(0, pt.life);
        ctx.fillStyle = pt.color;
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, pt.size * pt.life, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    // ---------- Theme backgrounds, drawn entirely on canvas ----------
    // Every theme is procedurally rendered (gradient sky + decorative
    // silhouettes), so there is zero network dependency and every visual
    // element shares the same clean art style as the clouds.
    let currentTheme = 'theme-buildings';
    let previousTheme = null;
    let themeTransition = 1; // 0 -> 1, 1 = fully transitioned
    const themeStars = Array.from({ length: 40 }, () => ({
      x: Math.random(), y: Math.random(), r: Math.random() * 1.5 + 0.5, phase: Math.random() * Math.PI * 2
    }));
    const themeBuildings = Array.from({ length: 7 }, (_, i) => ({
      x: i / 7, w: 0.09 + Math.random() * 0.06, h: 0.25 + Math.random() * 0.35
    }));
    const themeBirds = Array.from({ length: 6 }, () => ({
      x: Math.random(), y: Math.random() * 0.6, phase: Math.random() * Math.PI * 2, speed: 0.5 + Math.random()
    }));
    let bgTime = 0;

    function paintTheme(theme, alpha) {
      if (alpha <= 0) return;
      ctx.save();
      ctx.globalAlpha = alpha;
      const w = canvas.width, h = canvas.height;

      if (theme === 'theme-buildings') {
        const grad = ctx.createLinearGradient(0, 0, 0, h);
        grad.addColorStop(0, '#87CEEB');
        grad.addColorStop(1, '#e0f7ff');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, w, h);
        // distant building silhouettes
        ctx.fillStyle = 'rgba(120,150,180,0.35)';
        themeBuildings.forEach(b => {
          const bw = b.w * w, bh = b.h * h;
          ctx.fillRect(b.x * w, h - bh, bw, bh);
        });
      } else if (theme === 'theme-birds') {
        const grad = ctx.createLinearGradient(0, 0, 0, h);
        grad.addColorStop(0, '#4B0082');
        grad.addColorStop(1, '#9400D3');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, w, h);
        ctx.strokeStyle = 'rgba(255,255,255,0.6)';
        ctx.lineWidth = 2;
        themeBirds.forEach(b => {
          const bx = b.x * w;
          const by = b.y * h + Math.sin(bgTime * b.speed + b.phase) * 10;
          ctx.beginPath();
          ctx.moveTo(bx - 8, by);
          ctx.quadraticCurveTo(bx - 4, by - 6, bx, by);
          ctx.quadraticCurveTo(bx + 4, by - 6, bx + 8, by);
          ctx.stroke();
        });
      } else if (theme === 'theme-space') {
        const grad = ctx.createLinearGradient(0, 0, 0, h);
        grad.addColorStop(0, '#000000');
        grad.addColorStop(1, '#000033');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, w, h);
        themeStars.forEach(s => {
          const twinkle = 0.4 + 0.6 * Math.abs(Math.sin(bgTime * 1.5 + s.phase));
          ctx.globalAlpha = alpha * twinkle;
          ctx.fillStyle = '#ffffff';
          ctx.beginPath();
          ctx.arc(s.x * w, s.y * h, s.r, 0, Math.PI * 2);
          ctx.fill();
        });
      }
      ctx.restore();
    }

    function drawBackground() {
      bgTime += 0.02;
      if (themeTransition < 1) {
        themeTransition = Math.min(1, themeTransition + 0.02); // ~1s crossfade
        paintTheme(previousTheme, 1 - themeTransition);
        paintTheme(currentTheme, themeTransition);
      } else {
        paintTheme(currentTheme, 1);
      }
    }

    function setTheme(themeName) {
      if (themeName === currentTheme) return;
      previousTheme = currentTheme;
      currentTheme = themeName;
      themeTransition = 0;
    }

    // Function to check player-power-up collision
    function checkPowerUpCollision() {
      for (let i = powerUps.length - 1; i >= 0; i--) {
        const pu = powerUps[i];
        if (!pu.taken) {
          if (
            player.x < pu.x + pu.width &&
            player.x + player.width > pu.x &&
            player.y < pu.y + pu.height &&
            player.y + player.height > pu.y
          ) {
            pu.taken = true;
            powerUps.splice(i, 1); // Remove collected power-up
            activatePowerUp(pu.type);
          }
        }
      }
    }

    // Activate power-up effect
    function activatePowerUp(type) {
      playSound(powerupSound, 'sfx');
      if (type === 'jump-boost') {
        if (!jumpBoostActive) {
          player.jumpPower *= 1.5; // Increase jump power
          jumpBoostActive = true;
          setTimeout(() => {
            player.jumpPower = originalJumpPower; // Reset jump power
            jumpBoostActive = false;
          }, 5000); // Lasts for 5 seconds
        }
      }
    }

    // Function to check player-coin collision
    function checkCoinCollision() {
      for (let i = coins.length - 1; i >= 0; i--) {
        const coin = coins[i];
        if (!coin.taken) {
          if (
            player.x < coin.x + coin.width &&
            player.x + player.width > coin.x &&
            player.y < coin.y + coin.height &&
            player.y + player.height > coin.y
          ) {
            coin.taken = true;
            coinScore++;
            coins.splice(i, 1); // Remove collected coin
            playSound(coinSound, 'sfx');
          }
        }
      }
    }

    // Main game update loop
    function update() {
      if (!gameStarted || isPaused) {
        animationFrameId = requestAnimationFrame(update); // Keep requesting frame even if paused to handle resume
        return;
      }

      ctx.clearRect(0, 0, canvas.width, canvas.height); // Clear canvas
      drawBackground(); // Painted first so everything else sits on top of it

      player.y += player.dy;
      player.dy += player.gravity;

      player.x += player.speed;

      // Keep player within canvas bounds
      if (player.x < 0) player.x = 0;
      if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;

      // Move platforms down if player is high enough
      if (player.y < canvas.height / 2) {
        const offset = canvas.height / 2 - player.y;
        player.y = canvas.height / 2;        // tetap jaga dia di tengah
        movePlatforms(offset);               // geser platform sesuai selisih aslinya
      }

      // Check if player falls off screen
      if (player.y > canvas.height) {
        lives--;
        updateLivesDisplay();
        playSound(damageSound, 'sfx');
        if (lives <= 0) {
          endGame();
          return; // Stop update loop
        } else {
          player.x = lastSafePosition.x;
          player.y = lastSafePosition.y;
          player.dy = 0;
          player.speed = 0;
          player.jumps = 0;

          // Visual effect on respawn
          createParticles(player.x + player.width / 2, player.y + player.height / 2);
        }
      }

      checkPlatformCollision();
      checkCoinCollision();
      checkPowerUpCollision();

      // Coin milestone popup
      const currentMilestone = Math.floor(coinScore / 100) * 100;
      if (currentMilestone > 0 && currentMilestone > lastMilestone) {
        lastMilestone = currentMilestone;
        
        coinMilestonePopup.style.display = 'block';
        setTimeout(() => {
          coinMilestonePopup.style.opacity = 1;
        }, 50);

        setTimeout(() => {
          coinMilestonePopup.style.opacity = 0;
          setTimeout(() => {
            coinMilestonePopup.style.display = 'none';
          }, 500);
        }, 2000);
      }

      // Level progression: increase platform speed
      platformSpeedMultiplier = Math.min(1.2, 1 + Math.floor(score / 200) * 0.04); // Very gentle, capped speed increase — high levels stay close to the starting difficulty

      // Theme switching — smooth canvas crossfade instead of an abrupt CSS
      // class swap, so moving to a new "place" feels like a scene
      // transition rather than a jarring cut. Cycles every 100 points now.
      let newThemeClass = 'theme-buildings';
      if (score > 0) {
        const themeCycle = Math.floor((score - 1) / 100) % 3;
        if (themeCycle === 1) {
          newThemeClass = 'theme-birds';
        } else if (themeCycle === 2) {
          newThemeClass = 'theme-space';
        }
      }

      if (newThemeClass !== currentTheme) {
        setTheme(newThemeClass);
        canvasElement.className = newThemeClass; // keeps the inset box-shadow tint in sync
        if (newThemeClass === 'theme-birds') {
          showThemePopup("🦅 Birds Theme", "#9C27B0");
        } else if (newThemeClass === 'theme-space') {
          showThemePopup("🌟 Space Theme", "#6a0dad");
        } else if (newThemeClass === 'theme-buildings') {
          showThemePopup("🏙️ Buildings Theme", "#2196F3");
        }
      }

      drawPlatforms();
      drawPlayer();
      drawCoins();
      drawPowerUps();
      updateAndDrawParticles();
      updateScoreDisplay();
      animationFrameId = requestAnimationFrame(update);
    }

    // End game function
    function endGame() {
      gameStarted = false;
      cancelAnimationFrame(animationFrameId); // Stop the game loop
      document.getElementById('finalScore').textContent = 'Skor Akhir: ' + score;

      updateLeaderboard(score); // Update leaderboard

      if (score > highScore) {
        highScore = score;
        localStorage.setItem('highScore', highScore);
        highScoreDisplay.textContent = '🎉 HIGH SCORE BARU! ' + highScore + ' 🎉';
        highScoreDisplay.classList.add('new-highscore');
      } else {
        highScoreDisplay.textContent = '⭐ SKOR TERTINGGI: ' + highScore + ' ⭐';
        highScoreDisplay.classList.remove('new-highscore');
      }

      document.getElementById('scoreDisplay').style.display = 'none';
      livesDisplay.style.display = 'none';
      pauseButton.style.display = 'none';
      document.querySelector('.audio-controls').style.display = 'flex'; // Tampilkan tombol mute saat game berakhir
      playSound(gameOverSound, 'sfx');
      gameOverScreen.style.display = 'block';
      setTimeout(() => {
          gameOverScreen.classList.add('show');
      }, 50);
      playSound(menuBgm, 'bgm');
      bgm.pause();
    }

    // Update score and coin display
    function updateScoreDisplay() {
      currentScoreDisplay.textContent = score;
      currentCoinScoreDisplay.textContent = coinScore;
    }

    // Update lives display
    function updateLivesDisplay() {
      const lifeIcons = livesDisplay.children;
      for (let i = 0; i < lifeIcons.length; i++) {
        if (i < lives) {
          lifeIcons[i].style.opacity = 1;
        } else {
          lifeIcons[i].style.opacity = 0.3; // Dim lost lives
        }
      }
    }

    // Keyboard controls
    document.addEventListener("keydown", e => {
      if (isPaused || !gameStarted) return;
      if (e.key === "ArrowLeft") {
        player.speed = -player.maxSpeed;
      } else if (e.key === "ArrowRight") {
        player.speed = player.maxSpeed;
      } else if (e.key === "ArrowUp" || e.key === " ") { // Double jump
        if (player.jumps < player.maxJumps) {
          player.dy = player.jumpPower;
          player.jumps++;
          createParticles(player.x + player.width/2, player.y + player.height);
          playSound(jumpSound, 'sfx');
        }
      }
    });

    document.addEventListener("keyup", e => {
      if (isPaused || !gameStarted) return;
      if (e.key === "ArrowLeft" || e.key === "ArrowRight") {
        player.speed = 0;
      }
    });

    // Touch controls
    let touchStartX = 0;
    let touchStartY = 0;
    canvas.addEventListener('touchstart', (e) => {
        if (isPaused || !gameStarted) return;
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
        e.preventDefault(); // Prevent scrolling
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
        if (isPaused || !gameStarted) return;
        const touchCurrentX = e.touches[0].clientX;
        const diffX = touchCurrentX - touchStartX;

        if (Math.abs(diffX) > 10) {
            if (diffX > 0) {
                player.speed = player.maxSpeed;
            } else {
                player.speed = -player.maxSpeed;
            }
        }
        e.preventDefault(); // Prevent scrolling
    }, { passive: false });

    canvas.addEventListener('touchend', (e) => {
        if (isPaused || !gameStarted) return;
        player.speed = 0;
        const touchEndX = e.changedTouches[0].clientX;
        const touchEndY = e.changedTouches[0].clientY;
        const diffY = touchStartY - touchEndY;

        // Simple tap for jump (if not a horizontal swipe)
        if (Math.abs(touchEndX - touchStartX) < 20 && diffY > 20) { // Detect upward swipe for jump
          if (player.jumps < player.maxJumps) {
            player.dy = player.jumpPower;
            player.jumps++;
            createParticles(player.x + player.width/2, player.y + player.height);
            playSound(jumpSound, 'sfx');
          }
        }
    });

    // Start game function
    function startGame() {
      if (!selectedCharacter) {
        alert("Silakan pilih karakter terlebih dahulu!");
        return;
      }

      playSound(bgm, 'bgm');
      menuBgm.pause();

      startScreen.classList.remove('show');
      setTimeout(() => {
        startScreen.style.display = "none";
      }, 500);

      document.getElementById('scoreDisplay').style.display = 'flex'; 
      livesDisplay.style.display = 'flex';
      pauseButton.style.display = 'block';
      document.querySelector('.audio-controls').style.display = 'none'; // Sembunyikan tombol mute saat game dimulai
      
      // Initialize game state
      score = 0;
      coinScore = 0;
      lastMilestone = 0;
      lives = 3;
      platformSpeedMultiplier = 1;
      player.jumpPower = originalJumpPower; // Reset jump power
      jumpBoostActive = false;

      // Reset platforms, coins, power-ups, particles
      platforms.length = 0;
      coins.length = 0;
      powerUps.length = 0;
      particles.length = 0;

      player.y = 500; // Reset player position
      player.dy = 0;
      player.speed = 0;
      player.jumps = 0;

      initializePlatforms(); // Re-initialize platform data
      updateLivesDisplay();

      // Reset theme to default (no fade needed at the very start)
      currentTheme = 'theme-buildings';
      previousTheme = null;
      themeTransition = 1;
      canvasElement.className = 'theme-buildings';

      setTimeout(() => {
        gameStarted = true;
        isPaused = false;
        update(); // Start game loop
      }, 500);
    }

    // Toggle pause state
    function togglePause() {
      isPaused = !isPaused;
      if (isPaused) {
        cancelAnimationFrame(animationFrameId); // Stop the game loop
        pauseScreen.style.display = 'block';
        setTimeout(() => {
          pauseScreen.classList.add('show');
        }, 50);
        bgm.pause();
        document.querySelector('.audio-controls').style.display = 'flex'; // Tampilkan tombol mute saat game dijeda
      } else {
        pauseScreen.classList.remove('show');
        setTimeout(() => {
          pauseScreen.style.display = 'none';
          update(); // Resume game loop
        }, 500);
        playSound(bgm, 'bgm');
        document.querySelector('.audio-controls').style.display = 'none'; // Sembunyikan tombol mute saat game dilanjutkan
      }
    }

    // Show character selection screen
    function showCharacterSelect() {
      document.getElementById('mainMenu').style.display = 'none';
      document.getElementById('characterSelect').style.display = 'block';
      // Reset selected character and hide start game button
      selectedCharacter = null;
      startGameButton.style.display = 'none';
      characterCards.forEach(card => card.classList.remove('selected'));
      selectedCharacterImg.src = ""; // Clear preview image
      document.getElementById('characterPreview').style.display = 'none';
    }

    // Back to main menu from character select or game over/pause screen
    function showStartMenu() {
      gameOverScreen.classList.remove('show');
      pauseScreen.classList.remove('show');
      setTimeout(() => {
        gameOverScreen.style.display = 'none';
        pauseScreen.style.display = 'none';
        startScreen.style.display = 'block';
        document.getElementById('mainMenu').style.display = 'block'; // Ensure main menu is visible
        document.getElementById('characterSelect').style.display = 'none'; // Hide character select
        setTimeout(() => {
          startScreen.classList.add('show');
        }, 50);
      }, 500);
      
      // Clear game state when returning to menu
      platforms.length = 0;
      particles.length = 0;

      // Ensure game loop is stopped
      cancelAnimationFrame(animationFrameId);
      gameStarted = false;
      isPaused = false;
      document.getElementById('scoreDisplay').style.display = 'none';
      livesDisplay.style.display = 'none';
      pauseButton.style.display = 'none';
      document.querySelector('.audio-controls').style.display = 'flex'; // Tampilkan tombol mute saat kembali ke menu utama
      loadLeaderboard(); // Reload leaderboard when returning to main menu
      playSound(menuBgm, 'bgm');
      bgm.pause();
    }

    // Back to main menu from character select
    function backToMain() {
      document.getElementById('characterSelect').style.display = 'none';
      document.getElementById('mainMenu').style.display = 'block';
      loadLeaderboard(); // Reload leaderboard when returning to main menu
    }

    // Character selection logic
    characterCards.forEach(card => {
      card.addEventListener('click', () => {
        characterCards.forEach(c => c.classList.remove('selected')); // Remove selected from all
        card.classList.add('selected'); // Add selected to clicked card
        selectedCharacter = parseInt(card.dataset.characterId);
        
        const charImageSrc = selectedCharacter === 1 ? "ChatGPT Image 15 Jul 2025 15.43.23.png" : "ChatGPT_Image_15_Jul_2025_15.20.27-removebg-preview.png";
        selectedCharacterImg.src = charImageSrc;
        document.getElementById('characterPreview').style.display = 'block';
        player.image.src = charImageSrc;
        startGameButton.style.display = 'block'; // Show the "Mulai Game!" button
      });
    });

    // Event listener for the "Mulai Game!" button in character select
    startGameButton.addEventListener('click', startGame);
    
    // Show theme change popup
    function showThemePopup(message, color) {
      const popup = document.createElement('div');
      popup.textContent = message;
      popup.classList.add('theme-popup');
      popup.style.background = color;
      
      document.body.appendChild(popup);
      
      setTimeout(() => {
        popup.style.opacity = '0';
        setTimeout(() => popup.remove(), 500);
      }, 1500);
    }

    // Restart game
    function restartGame() {
      gameOverScreen.classList.remove('show');
      setTimeout(() => {
        gameOverScreen.style.display = 'none';
      }, 500);

      // Clear game state before restarting
      platforms.length = 0;
      particles.length = 0;

      startGame(); // Re-initialize and start game
    }

    // Leaderboard functions
    function getLeaderboard() {
      const leaderboard = localStorage.getItem('leaderboard');
      return leaderboard ? JSON.parse(leaderboard) : [];
    }

    function saveLeaderboard(leaderboard) {
      localStorage.setItem('leaderboard', JSON.stringify(leaderboard));
    }

    function updateLeaderboard(newScore) {
      let leaderboard = getLeaderboard();
      leaderboard.push({ score: newScore, date: new Date().toLocaleString() });
      leaderboard.sort((a, b) => b.score - a.score); // Sort descending
      leaderboard = leaderboard.slice(0, 5); // Keep top 5 scores
      saveLeaderboard(leaderboard);
      displayLeaderboard();
    }

    function displayLeaderboard() {
      const leaderboard = getLeaderboard();
      leaderboardList.innerHTML = '';
      if (leaderboard.length === 0) {
        leaderboardList.innerHTML = '<li>Belum ada skor.</li>';
        return;
      }
      leaderboard.forEach((entry, index) => {
        const listItem = document.createElement('li');
        listItem.innerHTML = `<span>${index + 1}. ${entry.score}</span><span>${entry.date}</span>`;
        leaderboardList.appendChild(listItem);
      });
    }

    function loadLeaderboard() {
      displayLeaderboard();
    }
    
    function toggleLeaderboard() {
      const leaderboard = document.getElementById('leaderboard');
      const button = document.querySelector('.leaderboard-button');
      if (leaderboard.classList.contains('leaderboard-hidden')) {
        leaderboard.classList.remove('leaderboard-hidden');
        button.textContent = '⬇ Tutup Leaderboard';
      } else {
        leaderboard.classList.add('leaderboard-hidden');
        button.textContent = '⬆ Lihat Leaderboard';
      }
    }

    // Initial setup when page loads
    document.addEventListener('DOMContentLoaded', async () => {
      // Preload assets first
      await preloadAssets();

      document.getElementById('scoreDisplay').style.display = 'none'; 
      livesDisplay.style.display = 'none';
      pauseButton.style.display = 'none';
      
      startScreen.style.display = "block";
      setTimeout(() => {
          startScreen.classList.add('show');
      }, 50);

      if (highScore > 0) {
          highScoreDisplay.textContent = '⭐ SKOR TERTINGGI: ' + highScore + ' ⭐';
      } else {
          highScoreDisplay.textContent = '';
      }

      // Set initial canvas theme
      canvasElement.classList.add('theme-buildings');

      // Load leaderboard on startup
      loadLeaderboard();

      // Set initial audio control icons and states
      bgmControl.textContent = isBgmMuted ? '🔇' : '🎵';
      sfxControl.textContent = isSfxMuted ? '🔕' : '🔊';
      bgmControl.addEventListener('click', toggleBgmMute);
      sfxControl.addEventListener('click', toggleSfxMute);
      
      // Apply initial mute states to audio elements
      bgm.muted = isBgmMuted;
      menuBgm.muted = isBgmMuted;
      jumpSound.muted = isSfxMuted;
      coinSound.muted = isSfxMuted;
      gameOverSound.muted = isSfxMuted;
      powerupSound.muted = isSfxMuted;
      damageSound.muted = isSfxMuted;
      buttonSound.muted = isSfxMuted;

      // Try to play menu BGM after user interaction (e.g., after loading screen disappears)
      document.addEventListener('click', () => {
        if (!isBgmMuted && menuBgm.paused) {
          playSound(menuBgm, 'bgm');
        }
      }, { once: true });
    });

    // Service Worker registration for PWA
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(() => console.log("Service Worker terdaftar"))
        .catch(err => console.error("Service Worker gagal:", err));
    }
  </script>
