<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Card 🤍</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
  *{ margin:0; padding:0; box-sizing:border-box; }

  :root{
    --pink:#ff4f92;
    --pink2:#ff85b3;
    --white:#ffffff;
    --glass:rgba(255,255,255,.18);
    --shadow:0 15px 35px rgba(0,0,0,.18);
  }

  html{ scroll-behavior:smooth; }

  body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#fd5196,#fc76b0,#f8c4da);
    background-attachment:fixed;
    color:#fff;
    min-height:100vh;
    overflow-x:hidden;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:50px 16px 40px;
    position:relative;
  }

  /* floating hearts ambient */
  .float-heart{
    position:fixed;
    top:110%;
    font-size:22px;
    opacity:.5;
    pointer-events:none;
    animation:floatUp linear infinite;
    z-index:0;
  }
  @keyframes floatUp{
    to{ transform:translateY(-130vh) translateX(var(--tx,0px)) rotate(360deg); opacity:0; }
  }

  .top-bar{
    width:100%;
    max-width:600px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:18px;
    position:relative;
    z-index:1;
  }

  .back-btn{
    text-decoration:none;
    color:#fff;
    background:var(--glass);
    backdrop-filter:blur(10px);
    padding:10px 18px;
    border-radius:30px;
    font-size:14px;
    font-weight:500;
    box-shadow:var(--shadow);
    transition:transform .25s ease;
  }
  .back-btn:hover{ transform:translateY(-2px); }

  h2{
    text-align:center;
    font-size:clamp(1.4em,5vw,2em);
    margin-bottom:8px;
    text-shadow:0 4px 14px rgba(0,0,0,.2);
    position:relative;
    z-index:1;
  }

  .subtitle{
    text-align:center;
    font-size:14px;
    opacity:.92;
    max-width:420px;
    margin-bottom:10px;
    position:relative;
    z-index:1;
    line-height:1.7;
  }

  .memory-stats{
    display:flex;
    justify-content:center;
    gap:22px;
    margin:22px 0 26px;
    position:relative;
    z-index:1;
  }

  .memory-stats div{
    min-width:110px;
    padding:16px 22px;
    border-radius:20px;
    background:var(--glass);
    backdrop-filter:blur(12px);
    text-align:center;
    box-shadow:var(--shadow);
  }

  .memory-stats span{ font-size:13px; opacity:.9; }
  .memory-stats h3{ font-size:24px; margin-top:4px; }

  .memory-grid{
    width:min(520px,100%);
    margin:0 auto;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
    perspective:1000px;
    position:relative;
    z-index:1;
  }

  .memory-card{
    position:relative;
    aspect-ratio:1/1;
    cursor:pointer;
  }

  .memory-card-inner{
    position:relative;
    width:100%;
    height:100%;
    border-radius:16px;
    transition:transform .5s;
    transform-style:preserve-3d;
    box-shadow:0 10px 22px rgba(0,0,0,.18);
  }

  .memory-card.flipped .memory-card-inner,
  .memory-card.matched .memory-card-inner{
    transform:rotateY(180deg);
  }

  .memory-card-front,
  .memory-card-back{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:16px;
    backface-visibility:hidden;
  }

  .memory-card-front{
    background:linear-gradient(135deg,var(--pink),var(--pink2));
    font-size:clamp(22px,6vw,28px);
  }

  .memory-card-back{
    transform:rotateY(180deg);
    background:linear-gradient(135deg,#fff8fb,#ffe3ee);
    font-size:clamp(26px,7vw,34px);
    overflow:hidden;
  }

  .memory-card.matched{ animation:matchPop .5s; }
  @keyframes matchPop{
    0%{ transform:scale(1); }
    40%{ transform:scale(1.12); }
    100%{ transform:scale(1); }
  }

  .memory-restart{
    margin-top:30px;
    font-family:'Poppins',sans-serif;
    font-size:14px;
    font-weight:600;
    padding:13px 30px;
    border:none;
    border-radius:30px;
    background:#fff;
    color:var(--pink);
    cursor:pointer;
    box-shadow:var(--shadow);
    transition:transform .25s ease;
    position:relative;
    z-index:1;
  }
  .memory-restart:hover{ transform:translateY(-3px); }
  .memory-restart:active{ transform:translateY(0); }

  .memory-win-msg{
    margin-top:20px;
    font-size:17px;
    font-weight:500;
    text-align:center;
    max-width:420px;
    min-height:26px;
    position:relative;
    z-index:1;
    text-shadow:0 2px 8px rgba(0,0,0,.2);
  }

  /* confetti */
  .confetti-piece{
    position:fixed;
    top:-10px;
    width:9px;
    height:14px;
    z-index:5;
    pointer-events:none;
    animation:confettiFall linear forwards;
  }
  @keyframes confettiFall{
    to{ transform:translateY(110vh) rotate(600deg); opacity:0.2; }
  }

  @media (max-width:420px){
    .memory-grid{ gap:8px; }
    .memory-stats{ gap:14px; }
    .memory-stats div{ min-width:90px; padding:12px 14px; }
  }
</style>
</head>
<body>

<!-- Sound Effects -->
<audio id="flipSound" src="click.mp3" preload="auto"></audio>
<audio id="matchSound" src="coin.mp3" preload="auto"></audio>
<audio id="winSound" src="powerup.mp3" preload="auto"></audio>

<div class="top-bar">
  <a href="menu.html" class="back-btn">⬅ Menu</a>
  <span></span>
</div>

<h2>🎮 Memory Card</h2>
<p class="subtitle">Cocokkan semua pasangan kartunya sampai habis yaa 🤍</p>

<div class="memory-stats">
  <div>
    <span>Langkah</span>
    <h3 id="memMoves">0</h3>
  </div>
  <div>
    <span>Waktu</span>
    <h3 id="memTimer">00:00</h3>
  </div>
</div>

<div class="memory-grid" id="memoryGrid"></div>

<button id="memoryRestart" class="memory-restart">🔄 Main Lagi</button>

<p id="memoryWinMsg" class="memory-win-msg"></p>

<script>
  // Ambient floating hearts
  (function ambientHearts(){
    const symbols = ["🤍","💕","🌸","💗"];
    for(let i=0;i<10;i++){
      const h = document.createElement("div");
      h.className = "float-heart";
      h.textContent = symbols[Math.floor(Math.random()*symbols.length)];
      h.style.left = Math.random()*100+"vw";
      h.style.setProperty("--tx",(Math.random()*80-40)+"px");
      h.style.animationDuration = (10+Math.random()*10)+"s";
      h.style.animationDelay = (Math.random()*10)+"s";
      document.body.appendChild(h);
    }
  })();

  // Pasangan kartu (emoji tema cinta, bisa diganti foto kalau mau)
  const memoryPairs = ["💖","🌹","💌","🎂","🌸","💍","🧸","🍫"];

  const memoryGrid = document.getElementById("memoryGrid");
  const memMovesEl = document.getElementById("memMoves");
  const memTimerEl = document.getElementById("memTimer");
  const memoryRestartBtn = document.getElementById("memoryRestart");
  const memoryWinMsg = document.getElementById("memoryWinMsg");

  const flipSound = document.getElementById("flipSound");
  const matchSound = document.getElementById("matchSound");
  const winSound = document.getElementById("winSound");

  function playSfx(audio){
    try{
      audio.currentTime = 0;
      audio.play().catch(()=>{});
    }catch(e){}
  }

  let memFlipped = [];
  let memMatchedCount = 0;
  let memMoves = 0;
  let memBusy = false;
  let memTimerInterval = null;
  let memSeconds = 0;
  let memStarted = false;

  function shuffleArray(arr){
    const a = arr.slice();
    for(let i=a.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [a[i],a[j]] = [a[j],a[i]];
    }
    return a;
  }

  function formatTime(sec){
    const m = String(Math.floor(sec/60)).padStart(2,"0");
    const s = String(sec%60).padStart(2,"0");
    return m+":"+s;
  }

  function startMemTimer(){
    if(memStarted) return;
    memStarted = true;
    memTimerInterval = setInterval(()=>{
      memSeconds++;
      memTimerEl.textContent = formatTime(memSeconds);
    },1000);
  }

  function stopMemTimer(){
    clearInterval(memTimerInterval);
  }

  function buildMemoryBoard(){
    memoryGrid.innerHTML = "";
    memFlipped = [];
    memMatchedCount = 0;
    memMoves = 0;
    memBusy = false;
    memStarted = false;
    memSeconds = 0;
    stopMemTimer();
    memMovesEl.textContent = "0";
    memTimerEl.textContent = "00:00";
    memoryWinMsg.textContent = "";

    const deck = shuffleArray([...memoryPairs, ...memoryPairs]);

    deck.forEach(symbol=>{
      const card = document.createElement("div");
      card.className = "memory-card";
      card.dataset.symbol = symbol;
      card.innerHTML =
        '<div class="memory-card-inner">'+
          '<div class="memory-card-front">🤍</div>'+
          '<div class="memory-card-back">'+symbol+'</div>'+
        '</div>';
      card.addEventListener("click", onMemoryCardClick);
      memoryGrid.appendChild(card);
    });
  }

  function onMemoryCardClick(e){
    const card = e.currentTarget;
    if(memBusy) return;
    if(card.classList.contains("flipped") || card.classList.contains("matched")) return;
    if(memFlipped.length >= 2) return;

    startMemTimer();
    card.classList.add("flipped");
    playSfx(flipSound);
    memFlipped.push(card);

    if(memFlipped.length === 2){
      memMoves++;
      memMovesEl.textContent = memMoves;

      const first = memFlipped[0];
      const second = memFlipped[1];

      if(first.dataset.symbol === second.dataset.symbol){
        first.classList.add("matched");
        second.classList.add("matched");
        memFlipped = [];
        memMatchedCount++;
        playSfx(matchSound);

        if(memMatchedCount === memoryPairs.length){
          stopMemTimer();
          memoryWinMsg.textContent =
            "🎉 Selesai dalam "+memMoves+" langkah, "+formatTime(memSeconds)+"! Makasih udah main 🤍";
          playSfx(winSound);
          createConfetti();
        }
      } else {
        memBusy = true;
        setTimeout(()=>{
          first.classList.remove("flipped");
          second.classList.remove("flipped");
          memFlipped = [];
          memBusy = false;
        },900);
      }
    }
  }

  function createConfetti(){
    const colors = ["#ff4f92","#ff85b3","#ffd166","#ffffff","#ff9fc2"];
    for(let i=0;i<60;i++){
      setTimeout(()=>{
        const piece = document.createElement("div");
        piece.className = "confetti-piece";
        piece.style.left = Math.random()*100+"vw";
        piece.style.background = colors[Math.floor(Math.random()*colors.length)];
        piece.style.animationDuration = (2.2+Math.random()*1.6)+"s";
        piece.style.opacity = String(0.7+Math.random()*0.3);
        document.body.appendChild(piece);
        setTimeout(()=>piece.remove(), 4000);
      }, i*25);
    }
  }

  memoryRestartBtn.addEventListener("click", buildMemoryBoard);

  buildMemoryBoard();
</script>

</body>
</html>
